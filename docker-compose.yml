version: '3.8'

services:
  mysql:
    image: mysql:5.7
    container_name: mysql-poetry
    restart: unless-stopped
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: Wu270810...
      MYSQL_DATABASE: cool-poetry
      MYSQL_USER: easy
      MYSQL_PASSWORD: wu270810
    volumes:
      - ./mysql-data:/var/lib/mysql
    command:
      - --innodb_buffer_pool_size=512M
      - --max_connections=20
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    mem_limit: 800m